version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ptech_postgres
    restart: unless-stopped
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c work_mem=16MB
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptech_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    working_dir: /app
    environment:
      # We use asyncpg for fastapi async operations
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: super_secret_key_change_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      PYTHONPATH: /app

volumes:
  postgres_data:
