<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Add New Vehicle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff8c00", // High saturation orange
                        "primary-dark": "#e67e00",
                        "primary-glow": "rgba(255, 140, 0, 0.5)",
                        "background-dark": "#121212", // Pure dark background
                        "surface-dark": "#1E1E1E", // Slightly lighter for inputs
                        "deep-navy-start": "#0f172a", // Slate 900
                        "deep-navy-end": "#1e3a8a", // Blue 900
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    boxShadow: {
                        "glow": "0 0 10px rgba(255, 140, 0, 0.3)",
                    }
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            font-family: 'Manrope', sans-serif;
        }</style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-slate-100 font-display antialiased min-h-screen flex flex-col items-center justify-center">
<div class="relative flex h-full min-h-screen w-full max-w-[480px] flex-col overflow-hidden bg-background-dark shadow-2xl mx-auto border-x border-slate-800">
<header class="bg-gradient-to-r from-deep-navy-start to-deep-navy-end sticky top-0 z-10 px-4 pt-12 pb-6 shadow-lg shadow-black/40">
<div class="flex items-center justify-between">
<button aria-label="Go back" class="flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-xl font-bold text-white tracking-wide">Add New Vehicle</h1>
<div class="w-10"></div> 
</div>
</header>
<main class="flex-1 overflow-y-auto px-6 py-8 bg-background-dark">
<form class="flex flex-col gap-8">
<div class="flex justify-center mb-4">
<div class="relative flex h-24 w-24 items-center justify-center rounded-full bg-surface-dark border border-slate-700 shadow-inner">
<span class="material-symbols-outlined text-[40px] text-primary/80">directions_car</span>
<div class="absolute -bottom-1 -right-1 flex h-8 w-8 items-center justify-center rounded-full bg-primary text-white shadow-lg border-2 border-background-dark">
<span class="material-symbols-outlined text-[18px]">add_a_photo</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2 group">
<label class="text-sm font-medium tracking-wide text-slate-400 group-focus-within:text-primary transition-colors" for="nickname">
                    Vehicle Nickname
                </label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</div>
<input class="w-full rounded-xl border border-slate-700 bg-surface-dark py-4 pl-12 pr-4 text-base font-medium text-white shadow-sm placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_15px_rgba(255,140,0,0.15)] transition-all duration-300" id="nickname" placeholder="e.g., My Corolla" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2 group">
<label class="text-sm font-medium tracking-wide text-slate-400 group-focus-within:text-primary transition-colors" for="license">
                    License Plate Number
                </label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">pin</span>
</div>
<input class="w-full rounded-xl border border-slate-700 bg-surface-dark py-4 pl-12 pr-4 text-base font-medium uppercase text-white shadow-sm placeholder:text-slate-600 focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_15px_rgba(255,140,0,0.15)] transition-all duration-300" id="license" placeholder="e.g., LT 123 AB" type="text"/>
</div>
<p class="text-xs text-slate-500 ml-1 font-medium">Format: LT 000 AA (Standard Cameroonian Plate)</p>
</div>
<div class="flex flex-col gap-2 group">
<label class="text-sm font-medium tracking-wide text-slate-400 group-focus-within:text-primary transition-colors" for="type">
                    Vehicle Type
                </label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">category</span>
</div>
<select class="w-full appearance-none rounded-xl border border-slate-700 bg-surface-dark py-4 pl-12 pr-10 text-base font-medium text-white shadow-sm focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_15px_rgba(255,140,0,0.15)] transition-all duration-300" id="type">
<option class="text-slate-500" disabled="" selected="" value="">Select vehicle type</option>
<option value="sedan">Sedan</option>
<option value="suv">SUV / 4x4</option>
<option value="truck">Truck / Van</option>
<option value="motorbike">Motorbike</option>
</select>
<div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">expand_more</span>
</div>
</div>
</div>
</form>
</main>
<div class="sticky bottom-0 bg-background-dark/95 backdrop-blur-xl p-6 border-t border-slate-800">
<button class="w-full rounded-xl bg-primary hover:bg-primary-dark text-white font-bold text-lg py-4 shadow-[0_4px_20px_rgba(255,140,0,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
            Save Vehicle
        </button>
</div>
</div>

</body></html>
