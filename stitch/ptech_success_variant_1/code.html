<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Payment Success</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "success-green": "#22c55e",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "surface-dark": "#2c241b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center overflow-hidden relative selection:bg-primary/30">
<!-- Digital Confetti / Particle Effects Background -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0 opacity-40">
<!-- Floating particles -->
<div class="absolute top-[10%] left-[20%] w-2 h-2 bg-primary rounded-full opacity-60"></div>
<div class="absolute top-[30%] right-[15%] w-3 h-3 bg-success-green rounded-full opacity-50"></div>
<div class="absolute bottom-[25%] left-[10%] w-1.5 h-1.5 bg-primary rounded-full opacity-70"></div>
<div class="absolute top-[15%] right-[25%] w-2 h-2 bg-white rounded-full opacity-20"></div>
<div class="absolute top-[50%] left-[5%] w-2.5 h-2.5 bg-success-green rounded-full opacity-40"></div>
<div class="absolute bottom-[40%] right-[30%] w-1 h-1 bg-primary rounded-full opacity-60"></div>
<!-- Gradient Mesh Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-radial from-primary/10 to-transparent opacity-50 blur-3xl"></div>
</div>
<!-- Header / Close Button -->
<div class="absolute top-0 w-full flex items-center justify-end p-6 z-20">
<button class="text-slate-400 hover:text-white transition-colors flex items-center justify-center rounded-full p-2 bg-white/5 backdrop-blur-sm border border-white/10">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Main Content Area -->
<div class="relative w-full max-w-md px-6 flex flex-col items-center z-10 w-full flex-grow justify-center pb-24 pt-12">
<!-- Success Animation Container -->
<div class="relative mb-10 flex items-center justify-center">
<!-- Outer Glow Rings -->
<div class="absolute inset-0 rounded-full bg-success-green/20 blur-xl scale-150"></div>
<div class="absolute inset-0 rounded-full bg-primary/20 blur-xl scale-110"></div>
<!-- Concentric Rings -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Outer ring -->
<div class="absolute inset-0 border-4 border-t-primary border-r-success-green border-b-primary/50 border-l-success-green/50 rounded-full"></div>
<!-- Inner ring -->
<div class="absolute inset-2 border-2 border-dashed border-white/20 rounded-full"></div>
<!-- Checkmark Circle -->
<div class="w-20 h-20 bg-gradient-to-br from-success-green to-emerald-700 rounded-full flex items-center justify-center shadow-lg shadow-success-green/30 relative z-10">
<span class="material-symbols-outlined text-white text-5xl font-bold">check</span>
</div>
</div>
</div>
<!-- Success Message -->
<div class="text-center mb-10">
<h1 class="text-white tracking-tight text-4xl font-bold mb-2">Payment Confirmed</h1>
<p class="text-slate-400 text-lg">Your parking session has started.</p>
</div>
<!-- Glassmorphic Ticket Card -->
<div class="w-full relative group perspective">
<div class="relative w-full rounded-2xl overflow-hidden border border-white/10 bg-white/5 backdrop-blur-md shadow-2xl">
<!-- Card Glow Effect -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-2xl"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-success-green/10 rounded-full blur-2xl"></div>
<div class="p-6 relative z-10">
<div class="flex items-start justify-between mb-6">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-dark flex items-center justify-center text-primary border border-white/5">
<span class="material-symbols-outlined">local_parking</span>
</div>
<div>
<p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Zone</p>
<p class="text-white text-xl font-bold tracking-tight">Bastos</p>
</div>
</div>
<div class="bg-success-green/20 text-success-green px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 border border-success-green/20">
<span class="w-1.5 h-1.5 rounded-full bg-success-green animate-pulse"></span>
                            ACTIVE
                        </div>
</div>
<div class="space-y-4">
<div class="p-4 rounded-xl bg-black/20 border border-white/5 flex items-center justify-between">
<div>
<p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1">Vehicle Plate</p>
<p class="text-white text-lg font-mono font-medium">LT-012-AB</p>
</div>
<span class="material-symbols-outlined text-slate-500">directions_car</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1">Start Time</p>
<p class="text-white font-medium">14:30 PM</p>
</div>
<div class="text-right">
<p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1">Duration</p>
<p class="text-white font-medium">2 Hours</p>
</div>
</div>
</div>
</div>
<!-- Dashed Line -->
<div class="relative w-full h-4 bg-transparent flex items-center">
<div class="w-4 h-8 bg-background-dark rounded-r-full absolute left-0"></div>
<div class="w-full h-[1px] border-t-2 border-dashed border-white/10 mx-4"></div>
<div class="w-4 h-8 bg-background-dark rounded-l-full absolute right-0"></div>
</div>
<!-- Receipt ID -->
<div class="p-4 bg-black/20 flex justify-between items-center">
<span class="text-xs text-slate-500">Transaction ID</span>
<span class="text-xs font-mono text-slate-400">#PT-8839201</span>
</div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background-dark via-background-dark to-transparent pt-12 pb-8 px-6 z-20">
<div class="max-w-md mx-auto flex flex-col gap-3">
<button class="w-full h-14 bg-primary hover:bg-orange-600 text-background-dark text-lg font-bold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">timer</span>
                Active Timer
            </button>
<button class="w-full h-14 bg-transparent hover:bg-white/5 text-slate-300 hover:text-white border border-transparent hover:border-white/10 text-lg font-medium rounded-xl transition-all active:scale-[0.98]">
                Home
            </button>
</div>
</div>
</body></html>
