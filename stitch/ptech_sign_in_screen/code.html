<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Sign In</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910", // Deep obsidian/dark brown tone
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center">
<div class="w-full max-w-md h-full min-h-screen flex flex-col p-6 relative overflow-hidden">
<!-- Header / Logo Area -->
<div class="flex-1 flex flex-col items-center justify-center pt-10 pb-6">
<div class="w-24 h-24 bg-primary/20 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-sm border border-primary/30 shadow-[0_0_40px_-10px_rgba(242,127,13,0.3)]">
<span class="material-symbols-outlined text-primary text-5xl">local_parking</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">PTech</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm">Cameroon's smartest parking solution</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-5">
<!-- Phone Input -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium ml-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors">smartphone</span>
</div>
<input class="w-full bg-white dark:bg-[#2e2319] border border-slate-200 dark:border-[#453628] text-slate-900 dark:text-white rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-all shadow-sm" placeholder="6xx xxx xxx" type="tel"/>
</div>
</div>
<!-- PIN Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium">Security PIN</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-white dark:bg-[#2e2319] border border-slate-200 dark:border-[#453628] text-slate-900 dark:text-white rounded-xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-all shadow-sm" maxlength="4" placeholder="••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-primary text-sm font-medium hover:text-primary/80 transition-colors" href="#">Forgot PIN?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_-5px_rgba(242,127,13,0.4)] transition-transform active:scale-[0.98] flex items-center justify-center gap-2 mt-4">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- Biometric Option -->
<button class="w-full bg-transparent border border-slate-200 dark:border-[#453628] hover:bg-slate-50 dark:hover:bg-[#2e2319] text-slate-600 dark:text-slate-300 font-medium py-3 rounded-xl transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary">fingerprint</span>
<span>Sign in with Fingerprint</span>
</button>
</div>
<!-- Footer -->
<div class="mt-auto py-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                New to PTech? 
                <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Create Account</a>
</p>
</div>
</div>
</body></html>
