<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Onboarding - Payments</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col items-center justify-center overflow-hidden">
<div class="relative flex h-full w-full max-w-md flex-col justify-between p-6 md:h-[844px] md:border md:border-white/10 md:rounded-[3rem] md:shadow-2xl overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Decorative Background Gradient -->
<div class="absolute top-[-20%] left-[-10%] w-[120%] h-[50%] bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[80%] h-[40%] bg-primary/5 blur-[80px] rounded-full pointer-events-none"></div>
<!-- Header / Skip -->
<div class="flex w-full flex-row items-center justify-end z-10">
<button class="text-slate-500 dark:text-slate-400 text-sm font-medium hover:text-primary dark:hover:text-primary transition-colors">
                Skip
            </button>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center gap-8 w-full z-10">
<!-- Hero Illustration / Image Area -->
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center">
<!-- Glowing effect behind the cards -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent rounded-full blur-3xl"></div>
<div class="grid grid-cols-2 gap-4 w-full p-4 relative">
<!-- MTN MoMo Card Representation -->
<div class="flex flex-col items-center justify-center gap-3 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-6 shadow-lg transform hover:scale-105 transition-transform duration-300">
<div class="w-16 h-16 rounded-full bg-[#ffcc00] flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-black text-3xl font-bold">account_balance_wallet</span>
</div>
<span class="text-slate-900 dark:text-white font-bold text-sm tracking-wide">MTN MoMo</span>
</div>
<!-- Orange Money Card Representation -->
<div class="flex flex-col items-center justify-center gap-3 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-6 shadow-lg transform hover:scale-105 transition-transform duration-300 mt-8">
<div class="w-16 h-16 rounded-full bg-[#ff6600] flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-white text-3xl font-bold">payments</span>
</div>
<span class="text-slate-900 dark:text-white font-bold text-sm tracking-wide">Orange Money</span>
</div>
</div>
<!-- Abstract connection lines decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] border border-primary/20 rounded-full border-dashed animate-spin-slow pointer-events-none opacity-30"></div>
</div>
<!-- Text Content -->
<div class="flex flex-col gap-2 items-center text-center px-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">
                    Mobile Money Integration
                </h1>
<p class="text-slate-600 dark:text-slate-300 text-base font-normal leading-relaxed max-w-[300px]">
                    Quick and secure payments in CFA using your favorite mobile wallets. No cash needed.
                </p>
</div>
</div>
<!-- Footer / Navigation -->
<div class="flex flex-col w-full gap-8 pb-6 pt-4 z-10">
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-white/20 transition-all duration-300"></div>
<div class="h-2 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(242,127,13,0.5)] transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-white/20 transition-all duration-300"></div>
</div>
<!-- Action Button -->
<div class="flex px-4 justify-center w-full">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 text-background-dark text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/25 transition-all active:scale-[0.98]">
<span class="truncate">Next</span>
<span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</div>
