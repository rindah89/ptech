<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Sign Up Screen</title>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS with Config -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "surface-dark": "#342618",
                        "border-dark": "#684d31",
                        "text-muted": "#cbad90"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Mobile Container -->
<div class="relative w-full max-w-md min-h-screen bg-background-light dark:bg-background-dark flex flex-col">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between bg-transparent">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Sign Up</h2>
</div>
<!-- Header Section -->
<div class="px-6 pt-6 pb-2">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight text-left mb-2">Create Account</h1>
<p class="text-slate-500 dark:text-text-muted text-base font-normal leading-normal">Join PTech for seamless parking payments across Cameroon.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6 px-6 py-6 w-full">
<!-- Full Name Input -->
<label class="flex flex-col w-full gap-2">
<span class="text-slate-900 dark:text-white text-base font-medium leading-normal">Full Name</span>
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white h-14 placeholder:text-slate-400 dark:placeholder:text-text-muted px-4 text-base font-normal focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="Enter your full name" type="text"/>
</label>
<!-- Phone Number Input -->
<label class="flex flex-col w-full gap-2">
<span class="text-slate-900 dark:text-white text-base font-medium leading-normal">Phone Number</span>
<div class="flex w-full items-stretch rounded-xl border border-slate-300 dark:border-border-dark bg-white dark:bg-surface-dark overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<div class="flex items-center justify-center pl-4 pr-2 bg-slate-50 dark:bg-surface-dark border-r border-slate-200 dark:border-border-dark">
<span class="text-slate-500 dark:text-text-muted text-base font-medium whitespace-nowrap flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">flag</span>
                            +237
                        </span>
</div>
<input class="form-input flex-1 w-full border-none bg-transparent text-slate-900 dark:text-white h-14 placeholder:text-slate-400 dark:placeholder:text-text-muted px-3 text-base font-normal focus:ring-0" placeholder="6xx xxx xxx" type="tel"/>
<div class="flex items-center justify-center pr-4 text-slate-400 dark:text-text-muted">
<span class="material-symbols-outlined text-[24px]">smartphone</span>
</div>
</div>
</label>
<!-- Create PIN Input -->
<label class="flex flex-col w-full gap-2">
<span class="text-slate-900 dark:text-white text-base font-medium leading-normal">Create PIN</span>
<div class="flex w-full items-stretch rounded-xl border border-slate-300 dark:border-border-dark bg-white dark:bg-surface-dark overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<input class="form-input flex-1 w-full border-none bg-transparent text-slate-900 dark:text-white h-14 placeholder:text-slate-400 dark:placeholder:text-text-muted px-4 text-base font-normal focus:ring-0 tracking-widest" inputmode="numeric" maxlength="4" placeholder="••••" type="password"/>
<button class="flex items-center justify-center px-4 text-slate-400 dark:text-text-muted hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[24px]">visibility_off</span>
</button>
</div>
<span class="text-xs text-slate-500 dark:text-text-muted px-1">4-digit security PIN for transactions</span>
</label>
<!-- Terms Checkbox -->
<label class="flex items-start gap-3 mt-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-border-dark bg-white dark:bg-surface-dark checked:border-primary checked:bg-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none">check</span>
</div>
<span class="text-sm text-slate-600 dark:text-text-muted leading-tight pt-0.5 select-none">
                    I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                </span>
</label>
</form>
<!-- Spacer to push content up if needed -->
<div class="flex-1"></div>
<!-- Bottom Actions -->
<div class="px-6 py-6 w-full flex flex-col gap-4 mb-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Sign Up
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-2 text-base">
<span class="text-slate-500 dark:text-text-muted">Already have an account?</span>
<a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</div>
</div>
</div>
</body></html>
