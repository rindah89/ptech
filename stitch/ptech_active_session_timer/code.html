<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PTech Active Session (Dark Mode)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Exo+2:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF7F3F", // Neon Orange
                        "secondary": "#22c55e",
                        "obsidian": "#050505", // Deep obsidian black
                        "obsidian-light": "#121212", // Slightly lighter for cards
                        "surface-dark": "#1A1A1A", 
                        "muted-red": "#7f1d1d", // Muted red for stop button
                        "glass-border": "rgba(255, 127, 63, 0.3)",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "futuristic": ["Exo 2", "sans-serif"]
                    },
                    boxShadow: {
                        "neon": "0 0 15px rgba(255, 127, 63, 0.5), 0 0 30px rgba(255, 127, 63, 0.2)",
                        "glass": "0 8px 32px 0 rgba(0, 0, 0, 0.37)",
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }.conic-gradient-ring {
            background: conic-gradient(from 0deg, #FF7F3F 65%, #333 65%);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #fff calc(100% - 8px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #fff calc(100% - 8px));
        }.glass-panel {
            background: rgba(26, 26, 26, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-obsidian font-display min-h-screen flex flex-col justify-between text-slate-100 antialiased overflow-hidden selection:bg-primary selection:text-white">
<div class="flex-1 flex flex-col relative overflow-y-auto">
<header class="flex items-center justify-between p-4 pt-6 sticky top-0 z-20 bg-obsidian/90 backdrop-blur-md border-b border-white/5">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">arrow_back</span>
</button>
<h2 class="text-lg font-bold text-center flex-1 pr-10 tracking-wide">ACTIVE SESSION</h2>
</header>
<div class="flex flex-col items-center justify-center flex-1 px-6 py-6 w-full max-w-md mx-auto">
<div class="relative w-72 h-72 mb-10 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-[8px] border-white/5 shadow-inner"></div>
<div class="absolute inset-0 rounded-full border-[8px] border-transparent shadow-[0_0_20px_rgba(255,127,63,0.15)]" style="background: conic-gradient(from 0deg, #FF7F3F 65%, transparent 65%); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #fff calc(100% - 8px)); mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #fff calc(100% - 8px)); box-shadow: 0 0 15px rgba(255, 127, 63, 0.4);">
</div>
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5 bg-primary rounded-full shadow-[0_0_20px_4px_rgba(255,127,63,0.8)] border-2 border-white" style="transform: rotate(234deg) translateX(139px);"></div>
<div class="text-center z-10 flex flex-col items-center">
<div class="mb-3 p-2 rounded-full bg-primary/10 border border-primary/20 shadow-[0_0_15px_rgba(255,127,63,0.2)]">
<span class="material-symbols-outlined text-primary text-3xl filled block">local_parking</span>
</div>
<h1 class="text-5xl font-extrabold tracking-widest tabular-nums text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.3)] font-futuristic">01:24:15</h1>
<p class="text-sm font-medium text-primary uppercase tracking-[0.2em] mt-2 shadow-black drop-shadow-md">Time Remaining</p>
</div>
</div>
<div class="w-full glass-panel rounded-2xl p-6 mb-8 relative overflow-hidden group">
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="flex items-start gap-4 mb-5">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary/20 to-transparent border border-primary/20 flex items-center justify-center shrink-0 shadow-[0_0_10px_rgba(255,127,63,0.1)]">
<span class="material-symbols-outlined text-primary">location_on</span>
</div>
<div>
<h3 class="font-futuristic font-bold text-xl leading-tight text-white tracking-wide">Marché Central Zone A</h3>
<p class="text-sm text-slate-400 mt-1 font-light">Douala, Cameroon</p>
</div>
</div>
<div class="h-px bg-gradient-to-r from-transparent via-white/10 to-transparent w-full my-4"></div>
<div class="flex justify-between items-center">
<div>
<p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">License Plate</p>
<p class="font-futuristic font-bold text-xl tracking-wider text-white">LT-012-AB</p>
</div>
<div class="text-right">
<p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Expires At</p>
<p class="font-futuristic font-bold text-xl tracking-wider text-primary">14:30</p>
</div>
</div>
</div>
<div class="w-full grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-red-900/30 bg-muted-red/10 hover:bg-muted-red/20 active:scale-95 transition-all text-red-400 hover:text-red-300 group">
<span class="material-symbols-outlined text-3xl group-hover:drop-shadow-[0_0_8px_rgba(248,113,113,0.5)] transition-all">stop_circle</span>
<span class="font-bold text-sm tracking-wide">Stop Session</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-white/5 backdrop-blur-sm border border-glass-border shadow-[0_0_15px_rgba(255,127,63,0.15)] hover:bg-primary/10 hover:border-primary/50 hover:shadow-[0_0_20px_rgba(255,127,63,0.3)] active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined text-3xl drop-shadow-[0_0_5px_rgba(255,127,63,0.8)]">add_alarm</span>
<span class="font-bold text-sm tracking-wide">Extend Session</span>
</button>
</div>
<p class="text-center text-[10px] text-slate-600 mt-8 max-w-xs uppercase tracking-wider">
                Payments processed securely via Mobile Money
            </p>
</div>
</div>
<nav class="flex border-t border-white/5 bg-obsidian-light/80 backdrop-blur-lg px-4 pb-8 pt-4">
<a class="flex flex-1 flex-col items-center justify-center gap-1.5 text-slate-500 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:filled transition-transform group-hover:-translate-y-0.5">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1.5 text-primary relative" href="#">
<div class="absolute -top-4 w-8 h-1 bg-primary rounded-b-full shadow-[0_0_10px_rgba(255,127,63,0.8)]"></div>
<span class="material-symbols-outlined filled drop-shadow-[0_0_5px_rgba(255,127,63,0.5)]">timer</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Active</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1.5 text-slate-500 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:filled transition-transform group-hover:-translate-y-0.5">history</span>
<span class="text-[10px] font-bold uppercase tracking-widest">History</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1.5 text-slate-500 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:filled transition-transform group-hover:-translate-y-0.5">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Profile</span>
</a>
</nav>

</body></html>
